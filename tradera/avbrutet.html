<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Vindfall — Tradera avbröts</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#18191A; color:#F1EFEA; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:24px; }
  .card { max-width:460px; text-align:center; }
  .sigill { width:64px; height:64px; margin:0 auto 20px; display:block; }
  h1 { font-size:26px; line-height:1.15; margin:0 0 12px; letter-spacing:-0.02em; }
  p { font-size:16px; line-height:1.5; opacity:.85; margin:0; }
</style>
</head>
<body>
  <main class="card">
    <svg class="sigill" viewBox="0 0 100 100" aria-hidden="true"><g fill="#EE5E37">
      <ellipse cx="50" cy="20" rx="13" ry="18"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(45 50 50)"/>
      <ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(90 50 50)"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(135 50 50)"/>
      <ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(180 50 50)"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(225 50 50)"/>
      <ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(270 50 50)"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(315 50 50)"/>
      <circle cx="50" cy="50" r="22"/></g><circle cx="50" cy="50" r="11" fill="#18191A"/></svg>
    <h1>Ingen koppling gjordes</h1>
    <p>Du avbröt anslutningen till Tradera. Du kan stänga fliken och försöka igen i Vindfall när du vill.</p>
  </main>
</body>
</html>
