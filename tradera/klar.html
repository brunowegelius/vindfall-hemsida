<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Vindfall — Tradera ansluten</title>
<style>
  :root { --orange:#EE5E37; --lime:#DFF37D; --ink:#18191A; --paper:#F1EFEA; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:var(--orange); color:#FFF7F2; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:24px; }
  .card { max-width:460px; text-align:center; }
  .sigill { width:64px; height:64px; margin:0 auto 20px; display:block; }
  h1 { font-size:28px; line-height:1.1; margin:0 0 12px; letter-spacing:-0.02em; }
  p { font-size:16px; line-height:1.5; opacity:.92; margin:0 0 8px; }
  .hint { margin-top:22px; font-size:14px; opacity:.8; }
  details { margin-top:28px; text-align:left; background:rgba(0,0,0,.18); border-radius:12px; padding:14px 16px; }
  summary { cursor:pointer; font-size:13px; opacity:.85; }
  code { display:block; margin-top:10px; font-family:ui-monospace,Menlo,monospace; font-size:12px;
         white-space:pre-wrap; word-break:break-all; background:rgba(0,0,0,.25); padding:10px; border-radius:8px; }
</style>
</head>
<body>
  <main class="card">
    <svg class="sigill" viewBox="0 0 100 100" aria-hidden="true"><g fill="#DFF37D">
      <ellipse cx="50" cy="20" rx="13" ry="18"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(45 50 50)"/>
      <ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(90 50 50)"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(135 50 50)"/>
      <ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(180 50 50)"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(225 50 50)"/>
      <ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(270 50 50)"/><ellipse cx="50" cy="20" rx="13" ry="18" transform="rotate(315 50 50)"/>
      <circle cx="50" cy="50" r="22"/></g><circle cx="50" cy="50" r="11" fill="#EE5E37"/></svg>
    <h1>Klart — Tradera är kopplat</h1>
    <p>Du kan stänga den här fliken och gå tillbaka till Vindfall.</p>
    <p class="hint">Tryck på <strong>&bdquo;Jag har godkänt i Tradera&rdquo;</strong> i appen för att slutföra.</p>
    <details>
      <summary>Teknisk info (för test/felsökning)</summary>
      <code id="params">—</code>
    </details>
  </main>
  <script>
    // Visar vad Tradera skickade tillbaka (t.ex. userId/token om "Display token on
    // return URL" är på) — hjälp under sandbox-testet. Ingen data lämnar sidan.
    var q = location.search.slice(1) || location.hash.slice(1);
    document.getElementById('params').textContent = q ? decodeURIComponent(q) : '(inga parametrar i URL:en)';
  </script>
</body>
</html>
